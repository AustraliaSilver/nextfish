name: Auto Elo Nextfish vs Stockfish

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "nextfish-harenn/**"
      - ".github/workflows/auto-solo-vs-stockfish.yml"
  workflow_dispatch:
    inputs:
      games:
        description: "Number of games"
        required: false
        default: "500"
      tc:
        description: "Time control"
        required: false
        default: "10+0.1"
      concurrency:
        description: "Cutechess concurrency"
        required: false
        default: "1"
      threads:
        description: "Threads per engine"
        required: false
        default: "2"
      hash:
        description: "Hash MB per engine"
        required: false
        default: "512"

permissions:
  contents: read

concurrency:
  group: elo-solo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  elo:
    runs-on: windows-latest
    timeout-minutes: 360
    env:
      GAMES: ${{ github.event_name == 'push' && '500' || (github.event.inputs.games || '500') }}
      TC: ${{ github.event.inputs.tc || '10+0.1' }}
      CONCURRENCY: ${{ github.event.inputs.concurrency || '1' }}
      THREADS: ${{ github.event.inputs.threads || '1' }}
      HASH: ${{ github.event.inputs.hash || '128' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download pre-built Stockfish 18
        shell: pwsh
        run: |
          $url = "https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-windows-x86-64-avx2.zip"
          Invoke-WebRequest -Uri $url -OutFile "stockfish18.zip"
          Expand-Archive -Path "stockfish18.zip" -DestinationPath "." -Force
          Move-Item "stockfish/stockfish-windows-x86-64-avx2.exe" "stockfish_built.exe" -Force

      - name: Setup MSVC compiler
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Prepare directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force builds | Out-Null
          New-Item -ItemType Directory -Force matches | Out-Null

      - name: Ensure cutechess-cli
        shell: pwsh
        run: |
          $zip = "cutechess-cli-win64.zip"
          $urls = @(
            "https://github.com/cutechess/cutechess/releases/download/v1.3.1/cutechess-1.3.1-win64.zip",
            "https://github.com/cutechess/cutechess/releases/download/v1.3.1/cutechess-cli-win64.zip"
          )
          $downloaded = $false
          foreach ($url in $urls) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $zip
              $downloaded = $true
              break
            } catch { continue }
          }
          Expand-Archive -Path $zip -DestinationPath "." -Force
          $cli = Get-ChildItem -Path . -Recurse -Filter "cutechess-cli.exe" -File | Select-Object -First 1
          Copy-Item $cli.FullName ".\cutechess-cli.exe" -Force
          $cliDir = Split-Path -Path $cli.FullName -Parent
          Get-ChildItem -Path $cliDir -Filter "*.dll" -File | ForEach-Object { Copy-Item $_.FullName ".\" -Force }
          if (Test-Path (Join-Path $cliDir "platforms")) { Copy-Item (Join-Path $cliDir "platforms") ".\platforms" -Recurse -Force }

      - name: Ensure shared NNUE files
        shell: pwsh
        run: |
          $nnueFiles = @("nn-c288c895ea92.nnue", "nn-37f18f62d772.nnue")
          foreach ($name in $nnueFiles) {
            $url = "https://tests.stockfishchess.org/api/nn/$name"
            if (-not (Test-Path "src/$name")) { Invoke-WebRequest -Uri $url -OutFile "src/$name" }
            # Copy to root directory for runtime
            if (-not (Test-Path "./$name")) { Copy-Item "src/$name" "./$name" -Force }
          }

      - name: Build Nextfish
        shell: pwsh
        working-directory: src
        run: |
          make -j4 build ARCH=x86-64-avx2 COMP=mingw optimize=yes debug=no
          if (Test-Path "stockfish.exe") { Move-Item "stockfish.exe" "../nextfish_built.exe" }

      - name: Ensure HARENN model file
        shell: pwsh
        run: |
          # Copy HARENN model file from nextfish-harenn directory
          if (Test-Path "nextfish-harenn/nextfish.harenn") {
            Copy-Item "nextfish-harenn/nextfish.harenn" "nextfish.harenn" -Force
            Write-Host "HARENN model file copied to root directory for engine"
          } else {
            Write-Host "Warning: nextfish-harenn/nextfish.harenn not found"
          }

      - name: Verify model files
        shell: pwsh
        run: |
          # Verify HARENN model file
          if (Test-Path "./nextfish.harenn") {
            Write-Host "nextfish.harenn exists in root directory"
            $size = (Get-Item "./nextfish.harenn").Length
            Write-Host "nextfish.harenn size: $size bytes"
          } else {
            Write-Host "Warning: nextfish.harenn not found in root directory"
          }
          
          # Verify NNUE files
          $nnueFiles = @("nn-c288c895ea92.nnue", "nn-37f18f62d772.nnue")
          foreach ($name in $nnueFiles) {
            if (Test-Path "./$name") {
              Write-Host "$name exists in root directory"
            } else {
              Write-Host "Warning: $name not found in root directory"
            }
          }

      - name: Test engine initialization
        shell: pwsh
        run: |
          Write-Host "Testing Nextfish initialization..."
          $nextfish = Start-Process -FilePath "./nextfish_built.exe" -ArgumentList "uci", "quit" -RedirectStandardOutput "nextfish_test.log" -Wait -PassThru
          Write-Host "Nextfish exit code: $($nextfish.ExitCode)"
          Get-Content "nextfish_test.log" | Select-String -Pattern "HARENN" -Context 0,0
          
          Write-Host "Testing Stockfish18 initialization..."
          $stockfish = Start-Process -FilePath "./stockfish_built.exe" -ArgumentList "uci", "quit" -RedirectStandardOutput "stockfish_test.log" -Wait -PassThru
          Write-Host "Stockfish18 exit code: $($stockfish.ExitCode)"
          Get-Content "stockfish_test.log" | Select-String -Pattern "EvalFile" -Context 0,0

      - name: Run Elo match
        id: match
        shell: pwsh
        run: |
          $pgn = "matches/match.pgn"
          $log = "matches/match.log"
          $summary = "matches/summary.txt"
          ./cutechess-cli.exe -engine cmd=./nextfish_built.exe name=Nextfish proto=uci option.Threads=$env:THREADS option.Hash=$env:HASH option."Use DEE/HARENN"=false -engine cmd=./stockfish_built.exe name=Stockfish18 proto=uci option.Threads=$env:THREADS option.Hash=$env:HASH -each tc=$env:TC -games $env:GAMES -pgnout $pgn -concurrency $env:CONCURRENCY -openings file=UHO_2022_8mvs_+110_+119.pgn format=pgn -resign movecount=3 score=400 -draw movenumber=40 movecount=8 score=20 | Tee-Object -FilePath $log
          
          $score = Select-String -Path $log -Pattern '^Score of ' | Select-Object -Last 1
          $elo = Select-String -Path $log -Pattern '^Elo difference:' | Select-Object -Last 1
          Set-Content $summary -Value @($score.Line, $elo.Line)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Elo Result`n- $($score.Line)`n- $($elo.Line)"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextfish-vs-stockfish
          path: matches/*
